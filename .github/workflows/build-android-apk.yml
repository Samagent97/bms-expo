name: Build Expo Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build standalone APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm install

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --non-interactive --clean

      - name: Bundle JavaScript for standalone debug APK
        shell: bash
        run: |
          set -o pipefail
          mkdir -p android/app/src/main/assets
          npx expo export:embed \
            --platform android \
            --dev false \
            --entry-file node_modules/expo/AppEntry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res 2>&1 | tee build-log.txt

      - name: Build standalone APK
        shell: bash
        run: |
          set -o pipefail
          cd android
          ./gradlew assembleDebug --stacktrace --warning-mode all 2>&1 | tee -a ../build-log.txt

      - name: Upload standalone APK
        uses: actions/upload-artifact@v4
        with:
          name: EVTOP-BMS-expo-standalone-apk
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: EVTOP-BMS-expo-build-log
          path: build-log.txt
