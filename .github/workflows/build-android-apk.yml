name: Build Expo Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build standalone APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm install

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --non-interactive --clean

      - name: Generate release signing key
        shell: bash
        run: |
          keytool -genkeypair \
            -v \
            -keystore release.keystore \
            -storepass android \
            -alias evtop \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=EVTOP BMS, OU=Mobile, O=EVTOP, L=Lagos, ST=Lagos, C=NG"

      - name: Build release APK
        shell: bash
        run: |
          set -o pipefail
          cd android
          ./gradlew assembleRelease --stacktrace --warning-mode all 2>&1 | tee ../build-log.txt

      - name: Sign release APK
        shell: bash
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -n 1)
          "$APKSIGNER" sign \
            --ks release.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --ks-key-alias evtop \
            --out EVTOP-BMS-expo-release.apk \
            "$APK_PATH"

      - name: Upload standalone APK
        uses: actions/upload-artifact@v4
        with:
          name: EVTOP-BMS-expo-release-apk
          path: EVTOP-BMS-expo-release.apk

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: EVTOP-BMS-expo-build-log
          path: build-log.txt
